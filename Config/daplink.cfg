# E:/f4project/test_robowaker/Config/daplink.cfg
# DAPLink CMSIS-DAP v2 + STM32F407

# 1. 选择适配器驱动（新版语法）
adapter driver cmsis-dap

# 2. 选择 CMSIS-DAP 通讯后端
#    先用 auto，如果后面还有 CMSIS-DAP 相关错误再换 hid / usb_bulk 试
cmsis-dap backend auto
#cmsis-dap backend hid
#cmsis-dap backend usb_bulk

# 3. 按 VID/PID 过滤 DAPLink（你日志里就是 0xFAED:0x4870）
cmsis-dap vid_pid 0xFAED 0x4870

# 4. 如果有多个接口，选一个 USB interface，一般 0 就行
cmsis-dap usb interface 0

# 5. 使用 SWD
transport select swd

# 6. SWD 速度，先保守一点（从 4000 改成 1000）
adapter speed 1000

# 7. 目标是 STM32F4
source [find target/stm32h7x.cfg]

# 8. 复位方式
# 原来这句依赖外部 NRST，容易导致 reset/halt 超时
# reset_config srst_only srst_nogate

# 改成完全不用 SRST，只用软件复位（SysResetReq）
reset_config none
cortex_m reset_config sysresetreq
